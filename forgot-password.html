<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Reset Password — Utsanova Tech</title>
  <meta name="description" content="Reset your Utsanova Tech account password. Enter your email to receive a password reset link." />

   <!-- Standard Favicons -->
<link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/1616.png">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/3232.png">
<link rel="icon" type="image/png" sizes="48x48" href="/assets/favicon/4848.png">

<!-- Open Graph -->
<meta property="og:title" content="Login | Utsanova Technologies" />
<meta property="og:description" content="Secure login to access your Utsanova dashboard." />
<meta property="og:type" content="website" />

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.lineicons.com/4.0/lineicons.css" />

  <!-- Styles -->
  <link rel="stylesheet" href="./assets/css/auth.css" />
</head>

<body>
  <div class="auth-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;">
      <div class="auth-card">
        <a href="index.html">
          <img src="./assets/img/utsanova_mono.svg" alt="Utsanova" class="auth-logo" />
        </a>

        <!-- Step 1: Request Reset -->
        <div id="resetRequestView">
          <h1 class="auth-title">Forgot Password?</h1>
          <p class="auth-subtitle">No worries! Enter your email and we'll send you a reset link</p>

          <div id="authMessage" class="auth-message" role="alert">
            <span id="authMessageIcon"></span>
            <span id="authMessageText"></span>
          </div>

          <form id="resetForm" onsubmit="handlePasswordReset(event)">
            <div class="auth-form-group">
              <label for="resetEmail">Email Address</label>
              <input type="email" id="resetEmail" placeholder="you@example.com" required autocomplete="email" />
              <div id="resetEmailError" class="field-error"></div>
            </div>

            <button type="submit" id="resetSubmitBtn" class="auth-btn auth-btn-primary">
              <span class="btn-text">Send Reset Link</span>
              <span class="auth-spinner"></span>
            </button>
          </form>

          <div class="auth-footer">
            <a href="login.html" class="auth-link" style="display: inline-flex; align-items: center; gap: 6px;">
              <i class="lni lni-arrow-left"></i> Back to Sign In
            </a>
          </div>
        </div>

        <!-- Step 2: Email Sent Confirmation -->
        <div id="resetSentView" style="display: none; text-align: center;">
          <div style="width: 80px; height: 80px; border-radius: 50%; background: rgba(34, 197, 94, 0.15); display: flex; align-items: center; justify-content: center; margin: 0 auto 24px;">
            <i class="lni lni-envelope" style="font-size: 2rem; color: #86efac;"></i>
          </div>

          <h1 class="auth-title">Check Your Email</h1>
          <p class="auth-subtitle" style="margin-bottom: 24px;">
            We've sent a password reset link to<br>
            <strong id="sentEmailDisplay" style="color: #94b5ff;"></strong>
          </p>

          <p style="color: rgba(255,255,255,0.45); font-size: 0.85rem; margin-bottom: 24px;">
            Didn't receive the email? Check your spam folder or
          </p>

          <button type="button" id="resendBtn" class="auth-btn auth-btn-google" onclick="handleResend()" style="margin-bottom: 16px;">
            <span class="btn-text"><i class="lni lni-reload"></i> Resend Email</span>
            <span class="auth-spinner"></span>
          </button>

          <div class="auth-footer">
            <a href="login.html" class="auth-link" style="display: inline-flex; align-items: center; gap: 6px;">
              <i class="lni lni-arrow-left"></i> Back to Sign In
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script src="./assets/js/firebase-config.js"></script>
  <script src="./assets/js/auth.js"></script>

  <script>
    let resetEmail = '';

    async function handlePasswordReset(e) {
      e.preventDefault();
      clearErrors();

      const email = document.getElementById('resetEmail').value.trim();

      if (!Auth.validateEmail(email)) {
        showFieldError('resetEmailError', 'Please enter a valid email address');
        return;
      }

      resetEmail = email;
      setLoading('resetSubmitBtn', true);
      const result = await Auth.sendPasswordReset(email);
      setLoading('resetSubmitBtn', false);

      if (result.success) {
        // Show the success view
        document.getElementById('resetRequestView').style.display = 'none';
        document.getElementById('resetSentView').style.display = 'block';
        document.getElementById('sentEmailDisplay').textContent = email;
      } else {
        showMessage('error', result.message);
      }
    }

    async function handleResend() {
      if (!resetEmail) return;

      setLoading('resendBtn', true);
      const result = await Auth.sendPasswordReset(resetEmail);
      setLoading('resendBtn', false);

      if (result.success) {
        // Brief feedback
        const btn = document.getElementById('resendBtn');
        const btnText = btn.querySelector('.btn-text');
        const originalText = btnText.innerHTML;
        btnText.innerHTML = '<i class="lni lni-checkmark-circle"></i> Email Sent!';
        setTimeout(() => {
          btnText.innerHTML = originalText;
        }, 3000);
      }
    }

    // ─── UI Helpers ─────────────────────────────
    function showMessage(type, text) {
      const msg = document.getElementById('authMessage');
      const icon = document.getElementById('authMessageIcon');
      const txtEl = document.getElementById('authMessageText');
      msg.className = `auth-message show ${type}`;
      icon.innerHTML = type === 'error' ? '<i class="lni lni-warning"></i>' : '<i class="lni lni-checkmark-circle"></i>';
      txtEl.textContent = text;
    }

    function showFieldError(id, text) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.classList.add('show');
    }

    function clearErrors() {
      document.querySelectorAll('.field-error').forEach(el => {
        el.classList.remove('show');
        el.textContent = '';
      });
      const msg = document.getElementById('authMessage');
      if (msg) msg.className = 'auth-message';
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      if (loading) {
        btn.classList.add('loading');
        btn.disabled = true;
      } else {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }
  </script>
</body>

</html>
